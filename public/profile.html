<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - SolvIt</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .profile-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .profile-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 30px;
      margin-bottom: 20px;
      text-align: center;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      margin: 0 auto 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .profile-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .profile-name {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .profile-username {
      color: var(--text2);
      font-family: monospace;
      margin-bottom: 8px;
    }

    .profile-email {
      color: var(--text2);
      font-size: 14px;
    }

    .profile-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 24px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--background);
      color: var(--text);
      font-size: 14px;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .social-media-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .social-input {
      flex: 1;
      min-width: 200px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: #6366f1;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--surf2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: var(--surf3);
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .avatar-upload {
      display: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .stat-card {
      text-align: center;
      padding: 16px;
      background: var(--surf2);
      border-radius: 8px;
    }

    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* Header Styles */
    .main-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
    }

    .logo h1 {
      font-size: 24px;
      font-weight: bold;
      color: var(--accent);
      margin: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-link {
      text-decoration: none;
      color: var(--text2);
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: var(--text);
      background: var(--surf2);
    }

    .nav-link.active {
      color: var(--accent);
      background: var(--surf2);
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: var(--surf2);
      color: var(--text);
    }

    /* Adjust profile container for header */
    .profile-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      padding-top: 40px;
      /* Add top padding for header */
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="main-header">
    <div class="header-content">
      <div class="logo">
        <h1>🛠️ SolvIt</h1>
      </div>
      <nav class="nav-links">
        <a href="/userDashboard.html" class="nav-link">🏠 Dashboard</a>
        <a href="/profile.html" class="nav-link active">👤 Profile</a>
        <button class="logout-btn" onclick="logout()" title="Logout">⏻ Logout</button>
      </nav>
    </div>
  </header>

  <div class="profile-container">
    <!-- Profile Header -->
    <div class="profile-header">
      <div class="profile-avatar" onclick="document.getElementById('avatarUpload').click()">
        <span id="avatarText">?</span>
      </div>
      <input type="file" id="avatarUpload" class="avatar-upload" accept="image/*" onchange="handleAvatarUpload(event)">
      <h1 class="profile-name" id="profileName">Loading...</h1>
      <div class="profile-username" id="profileUsername">@username</div>
      <div class="profile-email" id="profileEmail">email@example.com</div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="problemsCount">0</div>
          <div class="stat-label">Problems Posted</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="commentsCount">0</div>
          <div class="stat-label">Comments Made</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="votesCount">0</div>
          <div class="stat-label">Votes Cast</div>
        </div>
      </div>
    </div>

    <!-- Basic Information -->
    <div class="profile-section">
      <h2 class="section-title">👤 Basic Information</h2>
      <form id="basicInfoForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="13" max="120">
          </div>
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="prefer_not_to_say">Prefer not to say</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio" placeholder="Tell us about yourself..." maxlength="500"></textarea>
        </div>
      </form>
    </div>

    <!-- Contact Information -->
    <div class="profile-section">
      <h2 class="section-title">📞 Contact Information</h2>
      <form id="contactForm">
        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" name="location" placeholder="City, Country">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900">
        </div>

      </form>
    </div>

    <!-- Social Media -->
    <div class="profile-section">
      <h2 class="section-title">🌐 Social Media</h2>
      <form id="socialForm">
        <div class="social-media-links">
          <div class="social-input">
            <label for="twitter">Twitter</label>
            <input type="text" id="twitter" name="twitter" placeholder="@username">
          </div>
          <div class="social-input">
            <label for="linkedin">LinkedIn</label>
            <input type="text" id="linkedin" name="linkedin" placeholder="linkedin.com/in/username">
          </div>
        </div>
        <div class="social-media-links">
          <div class="social-input">
            <label for="facebook">Facebook</label>
            <input type="text" id="facebook" name="facebook" placeholder="facebook.com/username">
          </div>
          <div class="social-input">
            <label for="instagram">Instagram</label>
            <input type="text" id="instagram" name="instagram" placeholder="@username">
          </div>
        </div>
      </form>
    </div>

    <!-- Actions -->
    <div class="profile-actions">
      <button class="btn-secondary" onclick="resetForms()">Reset Changes</button>
      <button class="btn-primary" onclick="saveProfile()">Save Profile</button>
    </div>
  </div>

  <div id="alert" style="position: fixed; top: 20px; right: 20px; z-index: 1000; display: none;"></div>

  <script src="js/profile.js"></script>
</body>

</html>
